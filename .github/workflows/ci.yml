name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck and zsh
        run: sudo apt-get install -y shellcheck zsh

      # --repo-only: the runner has no brew tools, no ~/.zshrc, no Cursor —
      # the "installed tools / config files" sections only make sense on a
      # machine that actually ran install.sh. Without the flag CI is
      # permanently red on those checks.
      - name: Run checks
        run: bash tests/check.sh --repo-only
