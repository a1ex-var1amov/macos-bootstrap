name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck and zsh
        run: sudo apt-get install -y shellcheck zsh

      - name: Run checks
        run: bash tests/check.sh
