"$schema" = "https://starship.rs/config-schema.json"

add_newline = true

# Timeouts - tuned for lower command_lag (prompt redraw after each command)
# Lower command_timeout = faster prompt when git/kubectl are slow; raise if git status disappears in huge repos
scan_timeout = 20       # ms for directory scanning
command_timeout = 200    # ms for git, kubectl, etc.; bails sooner so prompt stays responsive

# Be explicit instead of $all for speed and control
format = '┌──\[ $directory\] $git_branch$git_status$kubernetes$python$golang$nodejs$cmd_duration$line_break└─$character'
right_format = "$time$jobs$status$localip"

palette = 'catppuccin_frappe'

[directory]
style = "blue"
truncate_to_repo = true
truncation_length = 3

[character]
success_symbol = "[\\$](bold)"
error_symbol = "[\\$](bold red)"
vimcmd_symbol = "[\\$](bold green)"

[git_branch]
format = "[$branch]($style)"
style = "bright-black"

[git_status]
# Keep minimal; starship runs one short git command per prompt
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)]($style) ($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = ""
untracked  = ""
modified   = ""
staged     = ""
renamed    = ""
deleted    = ""
ahead      = "⇡"
behind     = "⇣"
diverged   = "⇡⇣"
up_to_date = ""
stashed    = "≡"

[git_state]
format = '([$state( $progress_current/$progress_total)]($style)) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"
min_time = 300
show_milliseconds = true

[python]
format = "[$virtualenv]($style) [$version]($style) "
style = "bright-black"
detect_files = ["requirements.txt", "pyproject.toml", "Pipfile", "setup.py", "tox.ini"]
detect_folders = [".venv", "venv", "env"]

[kubernetes]
disabled = false
symbol = "⎈"
format = '[$symbol](blue) [$context](bold cyan)[:$namespace]($style) '

[[kubernetes.contexts]]
context_pattern = "arn:aws:eks:.*:cluster/(?P<cluster>[\\w-]+)"
context_alias = "$cluster"

[[kubernetes.contexts]]
context_pattern = "gke_.*_(?P<cluster>[^_]+)$"
context_alias = "$cluster"

[[kubernetes.contexts]]
context_pattern = "kubernetes-admin@(?P<cluster>.+)"
context_alias = "$cluster"

[[kubernetes.contexts]]
context_pattern = "docker-desktop"
context_alias = "docker"

# OpenShift / OCP — slash-style API URL: .../api-CLUSTER-domain-com:port/...
[[kubernetes.contexts]]
context_pattern = ".*/api-(?P<cluster>[\\w-]+)-[\\w]+-[\\w]+:\\d+/.*"
context_alias = "$cluster"

# OpenShift / OCP — dot-style API URL: api.CLUSTER.domain.com:port
[[kubernetes.contexts]]
context_pattern = "api\\.(?P<cluster>[^.]+)\\..+"
context_alias = "$cluster"

# Add your organisation-specific patterns here, e.g.:
# [[kubernetes.contexts]]
# context_pattern = "(?P<cluster>my-company-[\\w-]+)"
# context_alias = "$cluster"

[localip]
ssh_only = true  # faster and less noisy locally
format = '@[$localipv4]($style) '
disabled = false

[gcloud]
format = '[$symbol$active]($style) '
style = 'bold yellow'
disabled = true

[status]
disabled = true
format = "[$symbol$status]($style) "
map_symbol = true
style = "red"
recognize_signal_code = true

[time]
disabled = true
format = "[$time]($style) "
style = "bright-black"
use_12hr = false
time_format = "%H:%M:%S"

[jobs]
disabled = false
format = "[$symbol$number]($style) "
style = "bright-black"
symbol = "✦ "
number_threshold = 1

[golang]
disabled = false
format = "[$symbol($version )]($style)"
style = "bright-cyan"
symbol = "🐹 "

[nodejs]
disabled = false
format = "[$symbol($version )]($style)"
style = "bright-green"
symbol = "⬢ "
detect_files = ["package.json", ".node-version"]
detect_folders = ["node_modules"]

[palettes.catppuccin_frappe]
rosewater = "#f2d5cf"
flamingo = "#eebebe"
pink = "#f4b8e4"
mauve = "#ca9ee6"
red = "#e78284"
maroon = "#ea999c"
peach = "#ef9f76"
yellow = "#e5c890"
green = "#a6d189"
teal = "#81c8be"
sky = "#99d1db"
sapphire = "#85c1dc"
blue = "#8caaee"
lavender = "#babbf1"
text = "#c6d0f5"
subtext1 = "#b5bfe2"
subtext0 = "#a5adce"
overlay2 = "#949cbb"
overlay1 = "#838ba7"
overlay0 = "#737994"
surface2 = "#626880"
surface1 = "#51576d"
