# ── Tokyo Night Moon — tmux color overrides ────────────────────────────────────
# Palette reference:
#   bg=#222436  bg-alt=#1e2030  surface=#2d3f51  overlay=#444a73
#   text=#c8d3f5  subtle=#828bb8  muted=#545c7e
#   blue=#82aaff  orange=#ff966c  yellow=#ffc777  green=#c3e88d
#   red=#ff757f   purple=#c099ff  cyan=#86e1fc

set -g status-style "bg=#222436,fg=#c8d3f5"

set -g status-left-length 40
set -g status-left "\
#[fg=#222436,bg=#82aaff,bold] #S \
#[fg=#82aaff,bg=#1e2030,nobold]\
#[fg=#c8d3f5,bg=#1e2030] #{?client_prefix,#[fg=#ff966c]⬦,#[fg=#444a73]·} \
#[fg=#1e2030,bg=#222436]#[default] "

set -g status-right-length 120
set -g status-right "\
#[fg=#1e2030,bg=#222436]\
#[fg=#828bb8,bg=#1e2030] \
#(git -C '#{pane_current_path}' symbolic-ref --short HEAD 2>/dev/null | head -1 | awk 'NF{print \"⎇ \" $0}') \
#(kubectl config current-context 2>/dev/null | awk -F'[/:]' 'NF && $NF!=\"\"{printf \"⎈ \" substr($NF,1,20)}') \
#[fg=#82aaff,bg=#1e2030]\
#[fg=#222436,bg=#82aaff,bold] %a %d %b  %H:%M "

set -g  window-status-format \
  "#[fg=#444a73,bg=#222436] #I #W#{?window_zoomed_flag, 󰁄,}#{?window_activity_flag,#[fg=#ffc777] ●,} "
set -g  window-status-current-format \
  "#[fg=#ff966c,bg=#222436,bold] #I #W#{?window_zoomed_flag, 󰁄,} "
set -g  window-status-separator ""
setw -g window-status-activity-style "fg=#ffc777,bg=#222436"
setw -g window-status-bell-style     "fg=#ff757f,bg=#222436,bold"

set -g pane-border-style        "fg=#1e2030"
set -g pane-active-border-style "fg=#82aaff"

set -g mode-style            "fg=#222436,bg=#c099ff"
set -g message-style         "fg=#222436,bg=#ffc777,bold"
set -g message-command-style "fg=#ffc777,bg=#222436"
set -g clock-mode-colour     "#82aaff"

bind e display-popup \
  -E -w 80% -h 80% \
  -d "#{pane_current_path}" \
  -b rounded \
  -S "fg=#82aaff" \
  "zsh"

bind g display-popup \
  -E -w 95% -h 90% \
  -d "#{pane_current_path}" \
  -b rounded \
  -S "fg=#c3e88d" \
  "lazygit 2>/dev/null || (echo 'lazygit not found — brew install lazygit'; read)"

bind f display-popup \
  -E -w 50% -h 60% \
  -b rounded \
  -S "fg=#c099ff" \
  "tmux list-sessions \
     -F '#{session_name}: #{session_windows}w  #{?session_attached, attached, detached}' \
   | fzf --reverse --prompt='  session › ' \
   | cut -d: -f1 \
   | xargs -I{} tmux switch-client -t {}"
