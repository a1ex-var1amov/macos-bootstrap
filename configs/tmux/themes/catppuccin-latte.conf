# ── Catppuccin Latte — tmux color overrides ──────────────────────────────────
# Palette reference:
#   base=#eff1f5  surface0=#ccd0da  surface1=#bcc0cc  surface2=#acb0be
#   overlay1=#8c8fa1  text=#4c4f69  subtext0=#6c6f85
#   blue=#1e66f5  peach=#fe640b  green=#40a02b  yellow=#df8e1d
#   red=#d20f39   mauve=#8839ef  teal=#179299

set -g status-style "bg=#eff1f5,fg=#4c4f69"

set -g status-left-length 40
set -g status-left "\
#[fg=#eff1f5,bg=#1e66f5,bold] #S \
#[fg=#1e66f5,bg=#ccd0da,nobold]\
#[fg=#4c4f69,bg=#ccd0da] #{?client_prefix,#[fg=#fe640b]⬦,#[fg=#acb0be]·} \
#[fg=#ccd0da,bg=#eff1f5]#[default] "

set -g status-right-length 120
set -g status-right "\
#[fg=#ccd0da,bg=#eff1f5]\
#[fg=#6c6f85,bg=#ccd0da] \
#(git -C '#{pane_current_path}' symbolic-ref --short HEAD 2>/dev/null | head -1 | awk 'NF{print \"⎇ \" $0}') \
#(kubectl config current-context 2>/dev/null | awk -F'[/:]' 'NF && $NF!=\"\"{printf \"⎈ \" substr($NF,1,20)}') \
#[fg=#1e66f5,bg=#ccd0da]\
#[fg=#eff1f5,bg=#1e66f5,bold] %a %d %b  %H:%M "

set -g  window-status-format \
  "#[fg=#acb0be,bg=#eff1f5] #I #W#{?window_zoomed_flag, 󰁄,}#{?window_activity_flag,#[fg=#df8e1d] ●,} "
set -g  window-status-current-format \
  "#[fg=#fe640b,bg=#eff1f5,bold] #I #W#{?window_zoomed_flag, 󰁄,} "
set -g  window-status-separator ""
setw -g window-status-activity-style "fg=#df8e1d,bg=#eff1f5"
setw -g window-status-bell-style     "fg=#d20f39,bg=#eff1f5,bold"

set -g pane-border-style        "fg=#ccd0da"
set -g pane-active-border-style "fg=#1e66f5"

set -g mode-style            "fg=#eff1f5,bg=#8839ef"
set -g message-style         "fg=#eff1f5,bg=#df8e1d,bold"
set -g message-command-style "fg=#df8e1d,bg=#eff1f5"
set -g clock-mode-colour     "#1e66f5"

bind e display-popup \
  -E -w 80% -h 80% \
  -d "#{pane_current_path}" \
  -b rounded \
  -S "fg=#1e66f5" \
  "zsh"

bind g display-popup \
  -E -w 95% -h 90% \
  -d "#{pane_current_path}" \
  -b rounded \
  -S "fg=#40a02b" \
  "lazygit 2>/dev/null || (echo 'lazygit not found — brew install lazygit'; read)"

bind f display-popup \
  -E -w 50% -h 60% \
  -b rounded \
  -S "fg=#8839ef" \
  "tmux list-sessions \
     -F '#{session_name}: #{session_windows}w  #{?session_attached, attached, detached}' \
   | fzf --reverse --prompt='  session › ' \
   | cut -d: -f1 \
   | xargs -I{} tmux switch-client -t {}"
