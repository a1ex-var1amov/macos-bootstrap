# ── Tokyo Night Storm — tmux color overrides ───────────────────────────────────
# Palette reference:
#   bg=#24283b  bg-alt=#1f2335  surface=#2e3c64  overlay=#3b4261
#   text=#c0caf5  subtle=#a9b1d6  muted=#565f89
#   blue=#7aa2f7  orange=#ff9e64  yellow=#e0af68  green=#9ece6a
#   red=#f7768e   purple=#bb9af7  cyan=#7dcfff

set -g status-style "bg=#24283b,fg=#c0caf5"

set -g status-left-length 40
set -g status-left "\
#[fg=#24283b,bg=#7aa2f7,bold] #S \
#[fg=#7aa2f7,bg=#1f2335,nobold]\
#[fg=#c0caf5,bg=#1f2335] #{?client_prefix,#[fg=#ff9e64]⬦,#[fg=#3b4261]·} \
#[fg=#1f2335,bg=#24283b]#[default] "

set -g status-right-length 120
set -g status-right "\
#[fg=#1f2335,bg=#24283b]\
#[fg=#a9b1d6,bg=#1f2335] \
#(git -C '#{pane_current_path}' symbolic-ref --short HEAD 2>/dev/null | head -1 | awk 'NF{print \"⎇ \" $0}') \
#(kubectl config current-context 2>/dev/null | awk -F'[/:]' 'NF && $NF!=\"\"{printf \"⎈ \" substr($NF,1,20)}') \
#[fg=#7aa2f7,bg=#1f2335]\
#[fg=#24283b,bg=#7aa2f7,bold] %a %d %b  %H:%M "

set -g  window-status-format \
  "#[fg=#3b4261,bg=#24283b] #I #W#{?window_zoomed_flag, 󰁄,}#{?window_activity_flag,#[fg=#e0af68] ●,} "
set -g  window-status-current-format \
  "#[fg=#ff9e64,bg=#24283b,bold] #I #W#{?window_zoomed_flag, 󰁄,} "
set -g  window-status-separator ""
setw -g window-status-activity-style "fg=#e0af68,bg=#24283b"
setw -g window-status-bell-style     "fg=#f7768e,bg=#24283b,bold"

set -g pane-border-style        "fg=#1f2335"
set -g pane-active-border-style "fg=#7aa2f7"

set -g mode-style            "fg=#24283b,bg=#bb9af7"
set -g message-style         "fg=#24283b,bg=#e0af68,bold"
set -g message-command-style "fg=#e0af68,bg=#24283b"
set -g clock-mode-colour     "#7aa2f7"

bind e display-popup \
  -E -w 80% -h 80% \
  -d "#{pane_current_path}" \
  -b rounded \
  -S "fg=#7aa2f7" \
  "zsh"

bind g display-popup \
  -E -w 95% -h 90% \
  -d "#{pane_current_path}" \
  -b rounded \
  -S "fg=#9ece6a" \
  "lazygit 2>/dev/null || (echo 'lazygit not found — brew install lazygit'; read)"

bind f display-popup \
  -E -w 50% -h 60% \
  -b rounded \
  -S "fg=#bb9af7" \
  "tmux list-sessions \
     -F '#{session_name}: #{session_windows}w  #{?session_attached, attached, detached}' \
   | fzf --reverse --prompt='  session › ' \
   | cut -d: -f1 \
   | xargs -I{} tmux switch-client -t {}"
