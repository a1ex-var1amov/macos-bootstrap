# ── Catppuccin Macchiato — tmux color overrides ───────────────────────────────
# Palette reference:
#   base=#24273a  surface0=#363a4f  surface1=#494d64  surface2=#5b6078
#   overlay1=#8087a2  text=#cad3f5  subtext0=#a5adcb
#   blue=#8aadf4  peach=#f5a97f  green=#a6da95  yellow=#eed49f
#   red=#ed8796   mauve=#c6a0f6  teal=#8bd5ca

set -g status-style "bg=#24273a,fg=#cad3f5"

set -g status-left-length 40
set -g status-left "\
#[fg=#24273a,bg=#8aadf4,bold] #S \
#[fg=#8aadf4,bg=#363a4f,nobold]\
#[fg=#cad3f5,bg=#363a4f] #{?client_prefix,#[fg=#f5a97f]⬦,#[fg=#5b6078]·} \
#[fg=#363a4f,bg=#24273a]#[default] "

set -g status-right-length 120
set -g status-right "\
#[fg=#363a4f,bg=#24273a]\
#[fg=#a5adcb,bg=#363a4f] \
#(git -C '#{pane_current_path}' symbolic-ref --short HEAD 2>/dev/null | head -1 | awk 'NF{print \"⎇ \" $0}') \
#(kubectl config current-context 2>/dev/null | awk -F'[/:]' 'NF && $NF!=\"\"{printf \"⎈ \" substr($NF,1,20)}') \
#[fg=#8aadf4,bg=#363a4f]\
#[fg=#24273a,bg=#8aadf4,bold] %a %d %b  %H:%M "

set -g  window-status-format \
  "#[fg=#5b6078,bg=#24273a] #I #W#{?window_zoomed_flag, 󰁄,}#{?window_activity_flag,#[fg=#eed49f] ●,} "
set -g  window-status-current-format \
  "#[fg=#f5a97f,bg=#24273a,bold] #I #W#{?window_zoomed_flag, 󰁄,} "
set -g  window-status-separator ""
setw -g window-status-activity-style "fg=#eed49f,bg=#24273a"
setw -g window-status-bell-style     "fg=#ed8796,bg=#24273a,bold"

set -g pane-border-style        "fg=#363a4f"
set -g pane-active-border-style "fg=#8aadf4"

set -g mode-style            "fg=#24273a,bg=#c6a0f6"
set -g message-style         "fg=#24273a,bg=#eed49f,bold"
set -g message-command-style "fg=#eed49f,bg=#24273a"
set -g clock-mode-colour     "#8aadf4"

bind e display-popup \
  -E -w 80% -h 80% \
  -d "#{pane_current_path}" \
  -b rounded \
  -S "fg=#8aadf4" \
  "zsh"

bind g display-popup \
  -E -w 95% -h 90% \
  -d "#{pane_current_path}" \
  -b rounded \
  -S "fg=#a6da95" \
  "lazygit 2>/dev/null || (echo 'lazygit not found — brew install lazygit'; read)"

bind f display-popup \
  -E -w 50% -h 60% \
  -b rounded \
  -S "fg=#c6a0f6" \
  "tmux list-sessions \
     -F '#{session_name}: #{session_windows}w  #{?session_attached, attached, detached}' \
   | fzf --reverse --prompt='  session › ' \
   | cut -d: -f1 \
   | xargs -I{} tmux switch-client -t {}"
