# ── Rosé Pine Dawn — tmux color overrides ──────────────────────────────────────
# Palette reference:
#   bg=#faf4ed  surface=#fffaf3  overlay=#f2e9e1  highlight=#dfdad9
#   text=#575279  subtle=#9893a5  muted=#cecacd
#   love=#b4637a  gold=#ea9d34  rose=#d7827e  pine=#286983  foam=#56949f  iris=#907aa9

set -g status-style "bg=#faf4ed,fg=#575279"

set -g status-left-length 40
set -g status-left "\
#[fg=#faf4ed,bg=#286983,bold] #S \
#[fg=#286983,bg=#dfdad9,nobold]\
#[fg=#575279,bg=#dfdad9] #{?client_prefix,#[fg=#ea9d34]⬦,#[fg=#9893a5]·} \
#[fg=#dfdad9,bg=#faf4ed]#[default] "

set -g status-right-length 120
set -g status-right "\
#[fg=#dfdad9,bg=#faf4ed]\
#[fg=#9893a5,bg=#dfdad9] \
#(git -C '#{pane_current_path}' symbolic-ref --short HEAD 2>/dev/null | head -1 | awk 'NF{print \"⎇ \" $0}') \
#(kubectl config current-context 2>/dev/null | awk -F'[/:]' 'NF && $NF!=\"\"{printf \"⎈ \" substr($NF,1,20)}') \
#[fg=#286983,bg=#dfdad9]\
#[fg=#faf4ed,bg=#286983,bold] %a %d %b  %H:%M "

set -g  window-status-format \
  "#[fg=#9893a5,bg=#faf4ed] #I #W#{?window_zoomed_flag, 󰁄,}#{?window_activity_flag,#[fg=#ea9d34] ●,} "
set -g  window-status-current-format \
  "#[fg=#b4637a,bg=#faf4ed,bold] #I #W#{?window_zoomed_flag, 󰁄,} "
set -g  window-status-separator ""
setw -g window-status-activity-style "fg=#ea9d34,bg=#faf4ed"
setw -g window-status-bell-style     "fg=#b4637a,bg=#faf4ed,bold"

set -g pane-border-style        "fg=#dfdad9"
set -g pane-active-border-style "fg=#286983"

set -g mode-style            "fg=#faf4ed,bg=#907aa9"
set -g message-style         "fg=#faf4ed,bg=#ea9d34,bold"
set -g message-command-style "fg=#ea9d34,bg=#faf4ed"
set -g clock-mode-colour     "#286983"

bind e display-popup \
  -E -w 80% -h 80% \
  -d "#{pane_current_path}" \
  -b rounded \
  -S "fg=#286983" \
  "zsh"

bind g display-popup \
  -E -w 95% -h 90% \
  -d "#{pane_current_path}" \
  -b rounded \
  -S "fg=#56949f" \
  "lazygit 2>/dev/null || (echo 'lazygit not found — brew install lazygit'; read)"

bind f display-popup \
  -E -w 50% -h 60% \
  -b rounded \
  -S "fg=#907aa9" \
  "tmux list-sessions \
     -F '#{session_name}: #{session_windows}w  #{?session_attached, attached, detached}' \
   | fzf --reverse --prompt='  session › ' \
   | cut -d: -f1 \
   | xargs -I{} tmux switch-client -t {}"
