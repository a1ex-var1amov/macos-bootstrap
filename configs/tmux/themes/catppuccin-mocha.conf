# ── Catppuccin Mocha — tmux color overrides ───────────────────────────────────
# Palette reference:
#   base=#1e1e2e  surface0=#313244  surface1=#45475a  surface2=#585b70
#   overlay1=#7f849c  text=#cdd6f4  subtext0=#a6adc8
#   blue=#89b4fa  peach=#fab387  green=#a6e3a1  yellow=#f9e2af
#   red=#f38ba8   mauve=#cba6f7  teal=#94e2d5

set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

set -g status-left-length 40
set -g status-left "\
#[fg=#1e1e2e,bg=#89b4fa,bold] #S \
#[fg=#89b4fa,bg=#313244,nobold]\
#[fg=#cdd6f4,bg=#313244] #{?client_prefix,#[fg=#fab387]⬦,#[fg=#585b70]·} \
#[fg=#313244,bg=#1e1e2e]#[default] "

set -g status-right-length 120
set -g status-right "\
#[fg=#313244,bg=#1e1e2e]\
#[fg=#a6adc8,bg=#313244] \
#(git -C '#{pane_current_path}' symbolic-ref --short HEAD 2>/dev/null | head -1 | awk 'NF{print \"⎇ \" $0}') \
#(kubectl config current-context 2>/dev/null | awk -F'[/:]' 'NF && $NF!=\"\"{printf \"⎈ \" substr($NF,1,20)}') \
#[fg=#89b4fa,bg=#313244]\
#[fg=#1e1e2e,bg=#89b4fa,bold] %a %d %b  %H:%M "

set -g  window-status-format \
  "#[fg=#585b70,bg=#1e1e2e] #I #W#{?window_zoomed_flag, 󰁄,}#{?window_activity_flag,#[fg=#f9e2af] ●,} "
set -g  window-status-current-format \
  "#[fg=#fab387,bg=#1e1e2e,bold] #I #W#{?window_zoomed_flag, 󰁄,} "
set -g  window-status-separator ""
setw -g window-status-activity-style "fg=#f9e2af,bg=#1e1e2e"
setw -g window-status-bell-style     "fg=#f38ba8,bg=#1e1e2e,bold"

set -g pane-border-style        "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

set -g mode-style            "fg=#1e1e2e,bg=#cba6f7"
set -g message-style         "fg=#1e1e2e,bg=#f9e2af,bold"
set -g message-command-style "fg=#f9e2af,bg=#1e1e2e"
set -g clock-mode-colour     "#89b4fa"

bind e display-popup \
  -E -w 80% -h 80% \
  -d "#{pane_current_path}" \
  -b rounded \
  -S "fg=#89b4fa" \
  "zsh"

bind g display-popup \
  -E -w 95% -h 90% \
  -d "#{pane_current_path}" \
  -b rounded \
  -S "fg=#a6e3a1" \
  "lazygit 2>/dev/null || (echo 'lazygit not found — brew install lazygit'; read)"

bind f display-popup \
  -E -w 50% -h 60% \
  -b rounded \
  -S "fg=#cba6f7" \
  "tmux list-sessions \
     -F '#{session_name}: #{session_windows}w  #{?session_attached, attached, detached}' \
   | fzf --reverse --prompt='  session › ' \
   | cut -d: -f1 \
   | xargs -I{} tmux switch-client -t {}"
