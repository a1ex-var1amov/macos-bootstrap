# ── Rosé Pine Moon — tmux color overrides ──────────────────────────────────────
# Palette reference:
#   bg=#232136  surface=#2a273f  overlay=#393552  highlight=#44415a
#   text=#e0def4  subtle=#6e6a86  muted=#56526e
#   love=#eb6f92  gold=#f6c177  rose=#ea9a97  pine=#3e8fb0  foam=#9ccfd8  iris=#c4a7e7

set -g status-style "bg=#232136,fg=#e0def4"

set -g status-left-length 40
set -g status-left "\
#[fg=#232136,bg=#9ccfd8,bold] #S \
#[fg=#9ccfd8,bg=#393552,nobold]\
#[fg=#e0def4,bg=#393552] #{?client_prefix,#[fg=#f6c177]⬦,#[fg=#44415a]·} \
#[fg=#393552,bg=#232136]#[default] "

set -g status-right-length 120
set -g status-right "\
#[fg=#393552,bg=#232136]\
#[fg=#6e6a86,bg=#393552] \
#(git -C '#{pane_current_path}' symbolic-ref --short HEAD 2>/dev/null | head -1 | awk 'NF{print \"⎇ \" $0}') \
#(kubectl config current-context 2>/dev/null | awk -F'[/:]' 'NF && $NF!=\"\"{printf \"⎈ \" substr($NF,1,20)}') \
#[fg=#9ccfd8,bg=#393552]\
#[fg=#232136,bg=#9ccfd8,bold] %a %d %b  %H:%M "

set -g  window-status-format \
  "#[fg=#44415a,bg=#232136] #I #W#{?window_zoomed_flag, 󰁄,}#{?window_activity_flag,#[fg=#f6c177] ●,} "
set -g  window-status-current-format \
  "#[fg=#eb6f92,bg=#232136,bold] #I #W#{?window_zoomed_flag, 󰁄,} "
set -g  window-status-separator ""
setw -g window-status-activity-style "fg=#f6c177,bg=#232136"
setw -g window-status-bell-style     "fg=#eb6f92,bg=#232136,bold"

set -g pane-border-style        "fg=#393552"
set -g pane-active-border-style "fg=#9ccfd8"

set -g mode-style            "fg=#232136,bg=#c4a7e7"
set -g message-style         "fg=#232136,bg=#f6c177,bold"
set -g message-command-style "fg=#f6c177,bg=#232136"
set -g clock-mode-colour     "#9ccfd8"

bind e display-popup \
  -E -w 80% -h 80% \
  -d "#{pane_current_path}" \
  -b rounded \
  -S "fg=#9ccfd8" \
  "zsh"

bind g display-popup \
  -E -w 95% -h 90% \
  -d "#{pane_current_path}" \
  -b rounded \
  -S "fg=#3e8fb0" \
  "lazygit 2>/dev/null || (echo 'lazygit not found — brew install lazygit'; read)"

bind f display-popup \
  -E -w 50% -h 60% \
  -b rounded \
  -S "fg=#c4a7e7" \
  "tmux list-sessions \
     -F '#{session_name}: #{session_windows}w  #{?session_attached, attached, detached}' \
   | fzf --reverse --prompt='  session › ' \
   | cut -d: -f1 \
   | xargs -I{} tmux switch-client -t {}"
