# ── Dracula — tmux color overrides ────────────────────────────────────────────
# Palette reference:
#   bg=#282a36  surface=#44475a  overlay=#6272a4
#   text=#f8f8f2  subtle=#bfbfbf  muted=#6272a4
#   purple=#bd93f9  pink=#ff79c6  cyan=#8be9fd  green=#50fa7b
#   red=#ff5555  orange=#ffb86c  yellow=#f1fa8c

set -g status-style "bg=#282a36,fg=#f8f8f2"

set -g status-left-length 40
set -g status-left "\
#[fg=#282a36,bg=#bd93f9,bold] #S \
#[fg=#bd93f9,bg=#44475a,nobold]\
#[fg=#f8f8f2,bg=#44475a] #{?client_prefix,#[fg=#ffb86c]⬦,#[fg=#6272a4]·} \
#[fg=#44475a,bg=#282a36]#[default] "

set -g status-right-length 120
set -g status-right "\
#[fg=#44475a,bg=#282a36]\
#[fg=#bfbfbf,bg=#44475a] \
#(git -C '#{pane_current_path}' symbolic-ref --short HEAD 2>/dev/null | head -1 | awk 'NF{print \"⎇ \" $0}') \
#(kubectl config current-context 2>/dev/null | awk -F'[/:]' 'NF && $NF!=\"\"{printf \"⎈ \" substr($NF,1,20)}') \
#[fg=#bd93f9,bg=#44475a]\
#[fg=#282a36,bg=#bd93f9,bold] %a %d %b  %H:%M "

set -g  window-status-format \
  "#[fg=#6272a4,bg=#282a36] #I #W#{?window_zoomed_flag, 󰁄,}#{?window_activity_flag,#[fg=#f1fa8c] ●,} "
set -g  window-status-current-format \
  "#[fg=#ff79c6,bg=#282a36,bold] #I #W#{?window_zoomed_flag, 󰁄,} "
set -g  window-status-separator ""
setw -g window-status-activity-style "fg=#f1fa8c,bg=#282a36"
setw -g window-status-bell-style     "fg=#ff5555,bg=#282a36,bold"

set -g pane-border-style        "fg=#44475a"
set -g pane-active-border-style "fg=#bd93f9"

set -g mode-style            "fg=#282a36,bg=#ff79c6"
set -g message-style         "fg=#282a36,bg=#f1fa8c,bold"
set -g message-command-style "fg=#f1fa8c,bg=#282a36"
set -g clock-mode-colour     "#bd93f9"

bind e display-popup \
  -E -w 80% -h 80% \
  -d "#{pane_current_path}" \
  -b rounded \
  -S "fg=#bd93f9" \
  "zsh"

bind g display-popup \
  -E -w 95% -h 90% \
  -d "#{pane_current_path}" \
  -b rounded \
  -S "fg=#50fa7b" \
  "lazygit 2>/dev/null || (echo 'lazygit not found — brew install lazygit'; read)"

bind f display-popup \
  -E -w 50% -h 60% \
  -b rounded \
  -S "fg=#8be9fd" \
  "tmux list-sessions \
     -F '#{session_name}: #{session_windows}w  #{?session_attached, attached, detached}' \
   | fzf --reverse --prompt='  session › ' \
   | cut -d: -f1 \
   | xargs -I{} tmux switch-client -t {}"
