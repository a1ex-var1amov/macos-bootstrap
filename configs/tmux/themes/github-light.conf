# ── GitHub Light — tmux color tokens ─────────────────────────────────────────
# Palette reference (github.com Light Default):
#   canvas=#ffffff muted=#f6f8fa subtle=#eaeef2 emphasis=#d0d7de
#   fg-default=#24292f fg-muted=#57606a fg-subtle=#6e7781
#   red=#cf222e orange=#fb8500 yellow=#9a6700 green=#1a7f37
#   blue=#0969da purple=#8250df pink=#bf3989

set -g @bg       "#ffffff"
set -g @surface  "#f6f8fa"
set -g @text     "#24292f"
set -g @subtle   "#57606a"
set -g @muted    "#d0d7de"
set -g @accent   "#0969da"
set -g @accent2  "#fb8500"
set -g @ok       "#1a7f37"
set -g @warn     "#9a6700"
set -g @err      "#cf222e"
set -g @select   "#8250df"
