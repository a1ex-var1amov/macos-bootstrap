# ── Catppuccin Frappé — tmux color overrides ─────────────────────────────────
# Sourced by tmux.conf; overrides every color-bearing setting.
#
# Palette reference:
#   base=#303446  surface0=#414559  surface1=#51576d  surface2=#626880
#   overlay1=#838ba7  text=#c6d0f5  subtext0=#a5adce
#   blue=#8caaee  peach=#ef9f76  green=#a6d189  yellow=#e5c890
#   red=#e78284   mauve=#ca9ee6  teal=#81c8be

set -g status-style "bg=#303446,fg=#c6d0f5"

set -g status-left-length 40
set -g status-left "\
#[fg=#303446,bg=#8caaee,bold] #S \
#[fg=#8caaee,bg=#414559,nobold]\
#[fg=#c6d0f5,bg=#414559] #{?client_prefix,#[fg=#ef9f76]⬦,#[fg=#626880]·} \
#[fg=#414559,bg=#303446]#[default] "

set -g status-right-length 120
set -g status-right "\
#[fg=#414559,bg=#303446]\
#[fg=#a5adce,bg=#414559] \
#(git -C '#{pane_current_path}' symbolic-ref --short HEAD 2>/dev/null | head -1 | awk 'NF{print \"⎇ \" $0}') \
#(kubectl config current-context 2>/dev/null | awk -F'[/:]' 'NF && $NF!=\"\"{printf \"⎈ \" substr($NF,1,20)}') \
#[fg=#8caaee,bg=#414559]\
#[fg=#303446,bg=#8caaee,bold] %a %d %b  %H:%M "

set -g  window-status-format \
  "#[fg=#626880,bg=#303446] #I #W#{?window_zoomed_flag, 󰁄,}#{?window_activity_flag,#[fg=#e5c890] ●,} "
set -g  window-status-current-format \
  "#[fg=#ef9f76,bg=#303446,bold] #I #W#{?window_zoomed_flag, 󰁄,} "
set -g  window-status-separator ""
setw -g window-status-activity-style "fg=#e5c890,bg=#303446"
setw -g window-status-bell-style     "fg=#e78284,bg=#303446,bold"

set -g pane-border-style        "fg=#414559"
set -g pane-active-border-style "fg=#8caaee"

set -g mode-style            "fg=#303446,bg=#ca9ee6"
set -g message-style         "fg=#303446,bg=#e5c890,bold"
set -g message-command-style "fg=#e5c890,bg=#303446"
set -g clock-mode-colour     "#8caaee"

bind e display-popup \
  -E -w 80% -h 80% \
  -d "#{pane_current_path}" \
  -b rounded \
  -S "fg=#8caaee" \
  "zsh"

bind g display-popup \
  -E -w 95% -h 90% \
  -d "#{pane_current_path}" \
  -b rounded \
  -S "fg=#a6d189" \
  "lazygit 2>/dev/null || (echo 'lazygit not found — brew install lazygit'; read)"

bind f display-popup \
  -E -w 50% -h 60% \
  -b rounded \
  -S "fg=#ca9ee6" \
  "tmux list-sessions \
     -F '#{session_name}: #{session_windows}w  #{?session_attached, attached, detached}' \
   | fzf --reverse --prompt='  session › ' \
   | cut -d: -f1 \
   | xargs -I{} tmux switch-client -t {}"
