# ── Catppuccin Frappé — tmux color tokens ────────────────────────────────────
# Status-bar/format/binding logic lives in tmux.conf and reads these tokens.
# To add a theme: copy this file, change only the colors below.
#
# Palette reference:
#   base=#303446  surface0=#414559  surface1=#51576d  surface2=#626880
#   overlay1=#838ba7  text=#c6d0f5  subtext0=#a5adce
#   blue=#8caaee  peach=#ef9f76  green=#a6d189  yellow=#e5c890
#   red=#e78284   mauve=#ca9ee6  teal=#81c8be

set -g @bg       "#303446"   # main background
set -g @surface  "#414559"   # bar middle segments, inactive pane border
set -g @text     "#c6d0f5"   # primary text on @bg
set -g @subtle   "#a5adce"   # secondary text (git branch, k8s ctx)
set -g @muted    "#626880"   # tertiary text (inactive windows, dimmed dot)
set -g @accent   "#8caaee"   # session pill, datetime pill, active border
set -g @accent2  "#ef9f76"   # current window, prefix indicator
set -g @ok       "#a6d189"   # success / lazygit popup border
set -g @warn     "#e5c890"   # activity / message bar
set -g @err      "#e78284"   # bell
set -g @select   "#ca9ee6"   # copy-mode selection / fzf popup border
