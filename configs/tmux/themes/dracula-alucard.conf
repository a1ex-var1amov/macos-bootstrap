# ── Dracula Alucard — tmux color overrides (light warm cream) ─────────────────
# Palette reference:
#   bg=#fffbeb  surface=#e8e3d8  overlay=#cfcfde
#   text=#1f1f1f  subtle=#6c664b  muted=#9e9a8e
#   purple=#644ac9  pink=#a3144d  cyan=#036a96  green=#14710a
#   red=#cb3a2a  orange=#a34d14  yellow=#846e15

set -g status-style "bg=#fffbeb,fg=#1f1f1f"

set -g status-left-length 40
set -g status-left "\
#[fg=#fffbeb,bg=#644ac9,bold] #S \
#[fg=#644ac9,bg=#cfcfde,nobold]\
#[fg=#1f1f1f,bg=#cfcfde] #{?client_prefix,#[fg=#a34d14]⬦,#[fg=#9e9a8e]·} \
#[fg=#cfcfde,bg=#fffbeb]#[default] "

set -g status-right-length 120
set -g status-right "\
#[fg=#cfcfde,bg=#fffbeb]\
#[fg=#6c664b,bg=#cfcfde] \
#(git -C '#{pane_current_path}' symbolic-ref --short HEAD 2>/dev/null | head -1 | awk 'NF{print \"⎇ \" $0}') \
#(kubectl config current-context 2>/dev/null | awk -F'[/:]' 'NF && $NF!=\"\"{printf \"⎈ \" substr($NF,1,20)}') \
#[fg=#644ac9,bg=#cfcfde]\
#[fg=#fffbeb,bg=#644ac9,bold] %a %d %b  %H:%M "

set -g  window-status-format \
  "#[fg=#9e9a8e,bg=#fffbeb] #I #W#{?window_zoomed_flag, 󰁄,}#{?window_activity_flag,#[fg=#846e15] ●,} "
set -g  window-status-current-format \
  "#[fg=#a3144d,bg=#fffbeb,bold] #I #W#{?window_zoomed_flag, 󰁄,} "
set -g  window-status-separator ""
setw -g window-status-activity-style "fg=#846e15,bg=#fffbeb"
setw -g window-status-bell-style     "fg=#cb3a2a,bg=#fffbeb,bold"

set -g pane-border-style        "fg=#cfcfde"
set -g pane-active-border-style "fg=#644ac9"

set -g mode-style            "fg=#fffbeb,bg=#a3144d"
set -g message-style         "fg=#fffbeb,bg=#846e15,bold"
set -g message-command-style "fg=#846e15,bg=#fffbeb"
set -g clock-mode-colour     "#644ac9"

bind e display-popup \
  -E -w 80% -h 80% \
  -d "#{pane_current_path}" \
  -b rounded \
  -S "fg=#644ac9" \
  "zsh"

bind g display-popup \
  -E -w 95% -h 90% \
  -d "#{pane_current_path}" \
  -b rounded \
  -S "fg=#14710a" \
  "lazygit 2>/dev/null || (echo 'lazygit not found — brew install lazygit'; read)"

bind f display-popup \
  -E -w 50% -h 60% \
  -b rounded \
  -S "fg=#036a96" \
  "tmux list-sessions \
     -F '#{session_name}: #{session_windows}w  #{?session_attached, attached, detached}' \
   | fzf --reverse --prompt='  session › ' \
   | cut -d: -f1 \
   | xargs -I{} tmux switch-client -t {}"
