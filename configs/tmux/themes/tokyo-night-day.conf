# ── Tokyo Night Day — tmux color overrides ─────────────────────────────────────
# Palette reference:
#   bg=#e1e2e7  bg-alt=#d5d6db  surface=#b6bfe2  overlay=#a1a6c5
#   text=#3760bf  subtle=#6172b0  muted=#8990b3
#   blue=#2e7de9  orange=#b15c00  yellow=#8c6c3e  green=#587539
#   red=#f52a65   purple=#9854f1  cyan=#007197

set -g status-style "bg=#e1e2e7,fg=#3760bf"

set -g status-left-length 40
set -g status-left "\
#[fg=#e1e2e7,bg=#2e7de9,bold] #S \
#[fg=#2e7de9,bg=#d5d6db,nobold]\
#[fg=#3760bf,bg=#d5d6db] #{?client_prefix,#[fg=#b15c00]⬦,#[fg=#a1a6c5]·} \
#[fg=#d5d6db,bg=#e1e2e7]#[default] "

set -g status-right-length 120
set -g status-right "\
#[fg=#d5d6db,bg=#e1e2e7]\
#[fg=#6172b0,bg=#d5d6db] \
#(git -C '#{pane_current_path}' symbolic-ref --short HEAD 2>/dev/null | head -1 | awk 'NF{print \"⎇ \" $0}') \
#(kubectl config current-context 2>/dev/null | awk -F'[/:]' 'NF && $NF!=\"\"{printf \"⎈ \" substr($NF,1,20)}') \
#[fg=#2e7de9,bg=#d5d6db]\
#[fg=#e1e2e7,bg=#2e7de9,bold] %a %d %b  %H:%M "

set -g  window-status-format \
  "#[fg=#a1a6c5,bg=#e1e2e7] #I #W#{?window_zoomed_flag, 󰁄,}#{?window_activity_flag,#[fg=#8c6c3e] ●,} "
set -g  window-status-current-format \
  "#[fg=#b15c00,bg=#e1e2e7,bold] #I #W#{?window_zoomed_flag, 󰁄,} "
set -g  window-status-separator ""
setw -g window-status-activity-style "fg=#8c6c3e,bg=#e1e2e7"
setw -g window-status-bell-style     "fg=#f52a65,bg=#e1e2e7,bold"

set -g pane-border-style        "fg=#d5d6db"
set -g pane-active-border-style "fg=#2e7de9"

set -g mode-style            "fg=#e1e2e7,bg=#9854f1"
set -g message-style         "fg=#e1e2e7,bg=#8c6c3e,bold"
set -g message-command-style "fg=#8c6c3e,bg=#e1e2e7"
set -g clock-mode-colour     "#2e7de9"

bind e display-popup \
  -E -w 80% -h 80% \
  -d "#{pane_current_path}" \
  -b rounded \
  -S "fg=#2e7de9" \
  "zsh"

bind g display-popup \
  -E -w 95% -h 90% \
  -d "#{pane_current_path}" \
  -b rounded \
  -S "fg=#587539" \
  "lazygit 2>/dev/null || (echo 'lazygit not found — brew install lazygit'; read)"

bind f display-popup \
  -E -w 50% -h 60% \
  -b rounded \
  -S "fg=#9854f1" \
  "tmux list-sessions \
     -F '#{session_name}: #{session_windows}w  #{?session_attached, attached, detached}' \
   | fzf --reverse --prompt='  session › ' \
   | cut -d: -f1 \
   | xargs -I{} tmux switch-client -t {}"
