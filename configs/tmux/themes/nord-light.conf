# ── Nord Light — tmux color tokens ───────────────────────────────────────────
# Palette reference (community Snow-Storm light variant):
#   snowStorm0=#d8dee9 snowStorm1=#e5e9f0 snowStorm2=#eceff4
#   polarNight0=#2e3440 (text) polarNight1=#3b4252 polarNight2=#434c5e
#   accents reuse Frost + Aurora from Nord but slightly darker for contrast

set -g @bg       "#eceff4"
set -g @surface  "#e5e9f0"
set -g @text     "#2e3440"
set -g @subtle   "#434c5e"
set -g @muted    "#d8dee9"
set -g @accent   "#5e81ac"
set -g @accent2  "#81a1c1"
set -g @ok       "#a3be8c"
set -g @warn     "#ebcb8b"
set -g @err      "#bf616a"
set -g @select   "#b48ead"
