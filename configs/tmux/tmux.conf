# =============================================================================
# SUPER-UBER-TMUX  ·  Catppuccin Frappé
# Requires: tmux ≥ 3.2 (popups), ≥ 3.3 (pane-border-lines)
#
# Frappé palette reference:
#   base=#303446  surface0=#414559  surface1=#51576d  surface2=#626880
#   overlay1=#838ba7  text=#c6d0f5  subtext0=#a5adce
#   blue=#8caaee  peach=#ef9f76  green=#a6d189  yellow=#e5c890
#   red=#e78284   mauve=#ca9ee6  teal=#81c8be
# =============================================================================

# =============================================================================
# TERMINAL & TRUE COLOR
# =============================================================================
set -g  default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",ghostty:RGB"
set -ag terminal-overrides ",xterm-ghostty:RGB"

# Undercurl / colored underline support
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Pass through title and OSC sequences to outer terminal (Ghostty)
set -g allow-passthrough on

# =============================================================================
# GENERAL
# =============================================================================
set -g  base-index 1
setw -g pane-base-index 1
set -g  renumber-windows on
set -g  history-limit 100000
set -s  escape-time 0
set -g  mouse on
set -g  focus-events on
set -g  set-clipboard on
set -g  allow-rename on
set -g  set-titles on
set -g  set-titles-string "tx-#{session_name}"
setw -g aggressive-resize on

# =============================================================================
# STATUS BAR  —  powerline Frappé
#
#  ┌────────────────────────────────────────────────────────────────────────┐
#  │  SESSION ▶·   1 term  2 cfg ● 3 k8s      ◀ ⎇ main  ⎈ ctx ◀  時 date │
#  └────────────────────────────────────────────────────────────────────────┘
#  Left  :  [blue]  SESSION  [▶surface0]  ⬦(active prefix) / ·  [▶base]
#  Center:  window list — inactive=overlay1, active=peach bold
#  Right :  [◀surface0]  ⎇ git-branch  ⎈ k8s-ctx  [◀blue]  %a %d  %H:%M
# =============================================================================

set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#303446,fg=#c6d0f5"
set -g status-justify left

# ── Left: session name + prefix indicator ────────────────────────────────────
set -g status-left-length 40
set -g status-left "\
#[fg=#303446,bg=#8caaee,bold] #S \
#[fg=#8caaee,bg=#414559,nobold]\
#[fg=#c6d0f5,bg=#414559] #{?client_prefix,#[fg=#ef9f76]⬦,#[fg=#626880]·} \
#[fg=#414559,bg=#303446]#[default] "

# ── Right: git branch, k8s context, datetime ─────────────────────────────────
# #() commands run every status-interval seconds (5s).
# git: only prints if inside a git repo; kubectl: only prints if context exists.
set -g status-right-length 120
set -g status-right "\
#[fg=#414559,bg=#303446]\
#[fg=#a5adce,bg=#414559] \
#(git -C '#{pane_current_path}' symbolic-ref --short HEAD 2>/dev/null | head -1 | awk 'NF{print \"⎇ \" $0}') \
#(kubectl config current-context 2>/dev/null | awk -F'[/:]' 'NF && $NF!=\"\"{printf \"⎈ \" substr($NF,1,20)}') \
#[fg=#8caaee,bg=#414559]\
#[fg=#303446,bg=#8caaee,bold] %a %d %b  %H:%M "

# ── Window list ───────────────────────────────────────────────────────────────
set -g  window-status-format \
  "#[fg=#626880,bg=#303446] #I #W#{?window_zoomed_flag, 󰁄,}#{?window_activity_flag,#[fg=#e5c890] ●,} "
set -g  window-status-current-format \
  "#[fg=#ef9f76,bg=#303446,bold] #I #W#{?window_zoomed_flag, 󰁄,} "
set -g  window-status-separator ""
setw -g window-status-activity-style "fg=#e5c890,bg=#303446"
setw -g window-status-bell-style     "fg=#e78284,bg=#303446,bold"
setw -g monitor-activity on
set -g  visual-activity off

# =============================================================================
# PANE BORDERS
# =============================================================================
set -g pane-border-style        "fg=#414559"
set -g pane-active-border-style "fg=#8caaee"
# Uncomment for extra thick borders (requires tmux ≥ 3.3):
# set -g pane-border-lines heavy

# =============================================================================
# COLORS  —  copy mode, messages, clock
# =============================================================================
set -g mode-style            "fg=#303446,bg=#ca9ee6"       # selection: mauve
set -g message-style         "fg=#303446,bg=#e5c890,bold"  # cmd bar: yellow
set -g message-command-style "fg=#e5c890,bg=#303446"
set -g clock-mode-colour     "#8caaee"
set -g clock-mode-style      24

# =============================================================================
# KEY BINDINGS
# =============================================================================

# Reload config
bind r source-file ~/.tmux.conf \; display-message "  config reloaded"

# ── Splits (open in current path) ────────────────────────────────────────────
bind  |  split-window -h  -c "#{pane_current_path}"
bind  -  split-window -v  -c "#{pane_current_path}"
bind  _  split-window -fv -c "#{pane_current_path}"  # full-width horizontal
unbind '"'
unbind %

# ── New window in current path ───────────────────────────────────────────────
bind c new-window -c "#{pane_current_path}"

# ── Pane navigation (vim-style, with prefix) ─────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane resize (capital HJKL, repeatable) ───────────────────────────────────
bind -r H resize-pane -L 3
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 3

# ── Alt + arrow: pane navigation (no prefix needed) ──────────────────────────
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# ── Ctrl+Alt + arrow: pane resize (no prefix needed) ─────────────────────────
bind -n C-M-Left  resize-pane -L 2
bind -n C-M-Right resize-pane -R 2
bind -n C-M-Up    resize-pane -U 2
bind -n C-M-Down  resize-pane -D 2

# ── Alt + 1-9: window switching (no prefix needed) ───────────────────────────
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# ── Window management ─────────────────────────────────────────────────────────
bind Tab last-window                              # jump to last active window
bind <   swap-window -d -t -1                     # move window left
bind >   swap-window -d -t +1                     # move window right
bind X   kill-window                              # kill window
bind b   break-pane -d                            # break pane → new window

# ── Pane utilities ────────────────────────────────────────────────────────────
bind m   resize-pane -Z                           # toggle pane zoom
bind n   display-panes                            # flash pane numbers
bind y   setw synchronize-panes \; \
           display "Pane sync: #{?pane_synchronized,ON  ,OFF}"

# ── Popups (requires tmux ≥ 3.2) ─────────────────────────────────────────────

# Floating terminal — Prefix + e
bind e display-popup \
  -E -w 80% -h 80% \
  -d "#{pane_current_path}" \
  -b rounded \
  -S "fg=#8caaee" \
  "zsh"

# Lazygit popup — Prefix + g
bind g display-popup \
  -E -w 95% -h 90% \
  -d "#{pane_current_path}" \
  -b rounded \
  -S "fg=#a6d189" \
  "lazygit 2>/dev/null || (echo 'lazygit not found — brew install lazygit'; read)"

# FZF session switcher popup — Prefix + f
bind f display-popup \
  -E -w 50% -h 60% \
  -b rounded \
  -S "fg=#ca9ee6" \
  "tmux list-sessions \
     -F '#{session_name}: #{session_windows}w  #{?session_attached, attached, detached}' \
   | fzf --reverse --prompt='  session › ' \
   | cut -d: -f1 \
   | xargs -I{} tmux switch-client -t {}"

# =============================================================================
# COPY MODE  (vi-style, copies to macOS clipboard via pbcopy)
# =============================================================================
setw -g mode-keys vi

bind Enter copy-mode                               # also Enter → copy mode

bind -T copy-mode-vi v     send -X begin-selection
bind -T copy-mode-vi V     send -X select-line
bind -T copy-mode-vi C-v   send -X rectangle-toggle
bind -T copy-mode-vi y     send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Y     send -X copy-line \; run "tmux save-buffer - | pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel

# Mouse drag → copy
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# =============================================================================
# AUTOMATIC WINDOW NAMING
# =============================================================================
setw -g automatic-rename on
setw -g automatic-rename-format "#{b:pane_current_path}"
