# =============================================================================
# SUPER-UBER-TMUX
#
# Color tokens (@bg, @accent, …) are defined in ~/.config/tmux-theme.conf,
# which is sourced at the bottom of this file. Status-bar formats, pane
# borders, popups, and bindings all read those tokens, so adding a new theme
# means copying configs/tmux/themes/<name>.conf and editing 11 hex values.
#
# Status-bar shell-outs (git branch, k8s context) live in
# ~/.config/tmux/scripts/ — they cache + timeout so the status bar never
# blocks on slow filesystems or networked kubeconfigs.
#
# Requires: tmux >= 3.2 (popups), >= 3.3 (pane-border-lines, format expansion
#           in style options).
# =============================================================================

# =============================================================================
# COLOR TOKENS (defaults — Catppuccin Frappé)
#
# These are the fallback values used if no theme file is sourced. Theme files
# at the bottom of this config override them. Keep this list in sync with the
# theme files in configs/tmux/themes/*.conf.
# =============================================================================
set -g @bg       "#303446"
set -g @surface  "#414559"
set -g @text     "#c6d0f5"
set -g @subtle   "#a5adce"
set -g @muted    "#626880"
set -g @accent   "#8caaee"
set -g @accent2  "#ef9f76"
set -g @ok       "#a6d189"
set -g @warn     "#e5c890"
set -g @err      "#e78284"
set -g @select   "#ca9ee6"

# =============================================================================
# TERMINAL & TRUE COLOR
# =============================================================================
set -g  default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",xterm-ghostty:RGB"

# Undercurl / colored underline support
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Pass through title and OSC sequences to outer terminal (Ghostty)
set -g allow-passthrough on

# =============================================================================
# GENERAL
# =============================================================================
set -g  base-index 1
setw -g pane-base-index 1
set -g  renumber-windows on
set -g  history-limit 100000
set -s  escape-time 5
set -g  mouse on
set -g  focus-events on
set -g  set-clipboard on
set -g  allow-rename on
set -g  set-titles on
set -g  set-titles-string "tx-#{session_name}"
set -g  detach-on-destroy off
setw -g aggressive-resize on

# =============================================================================
# STATUS BAR  —  powerline, color tokens
#
#  ┌────────────────────────────────────────────────────────────────────────┐
#  │  SESSION ▶·   1 term  2 cfg ● 3 k8s      ◀ ⎇ main  ⎈ ctx ◀  時 date │
#  └────────────────────────────────────────────────────────────────────────┘
#  Left  :  [@accent]  SESSION  [▶@surface]  ⬦(prefix) / ·  [▶@bg]
#  Center:  window list — inactive=@muted, active=@accent2 bold
#  Right :  [◀@surface]  ⎇ git-branch  ⎈ k8s-ctx  [◀@accent]  %a %d  %H:%M
# =============================================================================

set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#{@bg},fg=#{@text}"
set -g status-justify left

# ── Left: session name + prefix indicator ────────────────────────────────────
set -g status-left-length 40
set -g status-left "\
#[fg=#{@bg},bg=#{@accent},bold] #S \
#[fg=#{@accent},bg=#{@surface},nobold]\
#[fg=#{@text},bg=#{@surface}] #{?client_prefix,#[fg=#{@accent2}]⬦,#[fg=#{@muted}]·} \
#[fg=#{@surface},bg=#{@bg}]#[default] "

# ── Right: git branch, k8s context, datetime ─────────────────────────────────
# #() commands run every status-interval seconds (5s). The git/k8s helpers
# cache and apply a hard timeout, so a slow disk or stale kubeconfig won't
# freeze the status bar.
set -g status-right-length 120
set -g status-right "\
#[fg=#{@surface},bg=#{@bg}]\
#[fg=#{@subtle},bg=#{@surface}] \
#(~/.config/tmux/scripts/git-branch.sh '#{pane_current_path}' | awk 'NF{print \"⎇ \" $0}') \
#(~/.config/tmux/scripts/k8s-context.sh | awk 'NF{print \"⎈ \" $0}') \
#[fg=#{@accent},bg=#{@surface}]\
#[fg=#{@bg},bg=#{@accent},bold] %a %d %b  %H:%M "

# ── Window list ───────────────────────────────────────────────────────────────
set -g  window-status-format \
  "#[fg=#{@muted},bg=#{@bg}] #I #W#{?window_zoomed_flag, 󰁄,}#{?window_activity_flag,#[fg=#{@warn}] ●,} "
set -g  window-status-current-format \
  "#[fg=#{@accent2},bg=#{@bg},bold] #I #W#{?window_zoomed_flag, 󰁄,} "
set -g  window-status-separator ""
setw -g window-status-activity-style "fg=#{@warn},bg=#{@bg}"
setw -g window-status-bell-style     "fg=#{@err},bg=#{@bg},bold"
setw -g monitor-activity on
set -g  visual-activity off

# =============================================================================
# PANE BORDERS
# =============================================================================
set -g pane-border-style        "fg=#{@surface}"
set -g pane-active-border-style "fg=#{@accent}"
# Uncomment for extra thick borders (requires tmux >= 3.3):
# set -g pane-border-lines heavy

# =============================================================================
# COLORS  —  copy mode, messages, clock
# =============================================================================
set -g mode-style            "fg=#{@bg},bg=#{@select}"
set -g message-style         "fg=#{@bg},bg=#{@warn},bold"
set -g message-command-style "fg=#{@warn},bg=#{@bg}"
set -g clock-mode-colour     "#{@accent}"
set -g clock-mode-style      24

# =============================================================================
# KEY BINDINGS
# =============================================================================

# Reload config
bind r source-file ~/.tmux.conf \; display-message "config reloaded"

# ── Splits (open in current path) ────────────────────────────────────────────
bind  |  split-window -h  -c "#{pane_current_path}"
bind  -  split-window -v  -c "#{pane_current_path}"
bind  _  split-window -fv -c "#{pane_current_path}"  # full-width horizontal
unbind '"'
unbind %

# ── New window in current path ───────────────────────────────────────────────
bind c new-window -c "#{pane_current_path}"
bind e new-window -c "#{pane_current_path}"          # mnemonic alias

# ── Pane navigation (vim-style, with prefix) ─────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane resize (capital HJKL, repeatable) ───────────────────────────────────
bind -r H resize-pane -L 3
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 3

# ── Alt + arrow: pane navigation (no prefix needed) ──────────────────────────
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# ── Ctrl+Alt + arrow: pane resize (no prefix needed) ─────────────────────────
bind -n C-M-Left  resize-pane -L 2
bind -n C-M-Right resize-pane -R 2
bind -n C-M-Up    resize-pane -U 2
bind -n C-M-Down  resize-pane -D 2

# ── Alt + 1-9: window switching (no prefix needed) ───────────────────────────
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# ── Window management ─────────────────────────────────────────────────────────
bind Tab last-window                              # jump to last active window
bind <   swap-window -d -t -1                     # move window left
bind >   swap-window -d -t +1                     # move window right
bind X   confirm-before -p "kill-window #W? (y/n) " kill-window
bind B   break-pane -d                            # break pane -> new window
# Note: Prefix + b stays as default `send-prefix` for nested tmux.
# Note: Prefix + & (default) kills window with confirmation.

# ── Pane utilities ────────────────────────────────────────────────────────────
bind n   display-panes                            # flash pane numbers
bind y   setw synchronize-panes \; \
           display "Pane sync: #{?pane_synchronized,ON,OFF}"
# Note: Prefix + z (default) toggles pane zoom.
# Note: Prefix + m (default) marks pane for move-pane -t '{marked}'.

# ── Popups (requires tmux >= 3.2) ────────────────────────────────────────────

# Floating terminal popup — Prefix + E
bind E display-popup \
  -E -w 80% -h 80% \
  -d "#{pane_current_path}" \
  -b rounded \
  -S "fg=#{@accent}" \
  "zsh"

# Lazygit popup — Prefix + g
bind g display-popup \
  -E -w 95% -h 90% \
  -d "#{pane_current_path}" \
  -b rounded \
  -S "fg=#{@ok}" \
  "lazygit 2>/dev/null || (echo 'lazygit not found — brew install lazygit'; read)"

# FZF session switcher popup — Prefix + f
bind f display-popup \
  -E -w 50% -h 60% \
  -b rounded \
  -S "fg=#{@select}" \
  "sess=\$(tmux list-sessions \
     -F '#{session_name}: #{session_windows}w  #{?session_attached, attached, detached}' \
   | fzf --reverse --prompt='session > ' \
   | cut -d: -f1); \
   [ -n \"\$sess\" ] && tmux switch-client -t \"\$sess\""

# Peek at another session in a popup — Prefix + P
# Useful for multi-cluster work: stay in your current session, fzf-pick
# another to attach to in a temporary popup, exit popup -> back where you were.
bind P display-popup \
  -E -w 90% -h 90% \
  -b rounded \
  -S "fg=#{@accent2}" \
  "sess=\$(tmux list-sessions \
     -F '#{session_name}: #{session_windows}w  #{?session_attached, attached, detached}' \
   | fzf --reverse --prompt='peek > ' \
   | cut -d: -f1); \
   [ -n \"\$sess\" ] && tmux attach -t \"\$sess\""

# =============================================================================
# COPY MODE  (vi-style, copies to macOS clipboard via pbcopy)
# =============================================================================
setw -g mode-keys vi

bind Enter copy-mode                               # also Enter -> copy mode

bind -T copy-mode-vi v     send -X begin-selection
bind -T copy-mode-vi V     send -X select-line
bind -T copy-mode-vi C-v   send -X rectangle-toggle
bind -T copy-mode-vi y     send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Y     send -X copy-line \; run "tmux save-buffer - | pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi H     send -X start-of-line
bind -T copy-mode-vi L     send -X end-of-line

# Mouse drag -> copy
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# =============================================================================
# AUTOMATIC WINDOW NAMING
# =============================================================================
setw -g automatic-rename on
setw -g automatic-rename-format "#{b:pane_current_path}"

# =============================================================================
# COLOR THEME (managed by install.sh — see configs/tmux/themes/)
# Theme files only override the @-tokens at the top of this file. To change
# theme: run ./install.sh or copy a theme file:
#   cp configs/tmux/themes/<name>.conf ~/.config/tmux-theme.conf
#   tmux source-file ~/.tmux.conf
# =============================================================================
source-file -q ~/.config/tmux-theme.conf

# Machine-local overrides — not tracked in git (status bar tweaks, SSH agents, etc.)
source-file -q ~/.tmux.local.conf
