# Tmux mouse mode — OFF (normal terminal behaviour)
#
# Installed to ~/.config/tmux-mouse.conf by install.sh when the user chose
# "normal terminal". Sourced from ~/.tmux.conf.
#
# With this setup, tmux does NOT intercept the mouse at all:
#   • Selection works exactly like a plain Ghostty window (click + drag, double-
#     click word, triple-click line) — and Cmd+C / Ghostty's own copy bindings
#     apply.
#   • Right-click shows Ghostty's native context menu, not tmux's.
#   • The scroll wheel scrolls Ghostty's scrollback, NOT tmux's copy-mode buffer.
#     Note: this means you can only scroll back to whatever Ghostty is showing
#     right now. To see tmux's full history, enter copy-mode (Prefix + [) and
#     navigate with vi keys (k/j, Ctrl+u/d, /search, etc.).
#   • Pane borders cannot be resized by dragging. Use Prefix + H/J/K/L (or
#     Ctrl+Alt+arrows) instead.
#   • set-clipboard is left off — OSC 52 clipboard writes from inside tmux are
#     ignored. Use `pbcopy < file` or copy from Ghostty's selection layer.
#
# To switch to full tmux mouse mode:
#   ./install.sh --update   (and pick "full tmux mouse" when asked)

set -g mouse off
set -g set-clipboard off

# Explicitly drop any tmux right-click menu binding so the outer terminal sees
# the click. (Default behaviour anyway with `mouse off`; this is belt-and-braces
# in case a plugin or user override flips mouse on later.)
unbind -n MouseDown3Pane
unbind -n MouseDown3Status
unbind -n MouseDown3StatusLeft
unbind -n MouseDown3StatusRight
