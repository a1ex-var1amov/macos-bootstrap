# Tmux mouse mode — SCROLL ONLY (the "normal terminal" feel)
#
# Installed to ~/.config/tmux-mouse.conf by install.sh when the user picked
# the second mouse-mode option. Sourced from ~/.tmux.conf.
#
# Behaviour:
#   • Wheel scrolls tmux's pane history (enters copy-mode under the hood).
#   • Click does nothing in tmux — no pane focus, no menu.
#   • Drag does nothing — no pane-border resize.
#   • Right-click does nothing — Ghostty's native context menu would show, but
#     tmux still has `mouse on` so the click is consumed before Ghostty sees
#     it. To get Ghostty's right-click menu, hold ⌥ Option while clicking.
#   • Selection: hold ⌥ Option in Ghostty for a native terminal selection
#     (bypasses tmux's mouse intercept). Without Option, drag-selection
#     doesn't work because tmux ate the click.
#   • Mouse inside apps (vim, fzf, htop): NOT forwarded — those apps will see
#     no mouse events. If you rely on this, use "Full tmux mouse mode" instead.
#
# Why not "truly mouse off"? Because tmux always uses Ghostty's alternate
# screen, and Ghostty's xterm-compatible behaviour translates wheel events on
# the alternate screen into Up/Down arrow keys. If tmux doesn't intercept the
# wheel, zsh sees those arrows and navigates command history — not what you
# want when trying to scroll back through output. So this mode picks the
# smallest possible tmux mouse footprint: just the wheel.
#
# Keyboard fallbacks (always available, regardless of mouse mode):
#   Prefix + [        Enter copy-mode (then vi keys: j/k, Ctrl-u/d, /search…)
#   Prefix + PgUp     Enter copy-mode and scroll up one page
#   Prefix + ]        Paste tmux buffer
#
# To switch back to full tmux mouse mode:
#   ./install.sh --update   (and pick "Full tmux mouse" when asked)

set -g mouse on
set -g set-clipboard off

# Wheel — enter tmux copy-mode and scroll the pane's history.
# When an alternate-screen app is running (vim/less/htop, where #{alternate_on}
# is 1), forward the mouse event to the app instead so vim/less can scroll
# their own buffer natively.
bind -n WheelUpPane   if-shell -F -t = "#{alternate_on}" "send-keys -M" \
                       "select-pane -t =; copy-mode -e; send-keys -X -N 3 scroll-up"
bind -n WheelDownPane if-shell -F -t = "#{alternate_on}" "send-keys -M" \
                       "send-keys -X -N 3 scroll-down"

# Strip every other mouse binding tmux ships with so clicks/drag/right-click
# are tmux no-ops. (Selection via ⌥ Option in Ghostty still works because that
# bypasses tmux entirely.)
unbind -n MouseDown1Pane
unbind -n MouseDown1Status
unbind -n MouseDown2Pane
unbind -n MouseDown3Pane
unbind -n MouseDown3Status
unbind -n MouseDown3StatusLeft
unbind -n MouseDown3StatusRight
unbind -n MouseDrag1Pane
unbind -n MouseDrag1Border
unbind -n MouseDragEnd1Pane
unbind -n DoubleClick1Pane
unbind -n TripleClick1Pane
