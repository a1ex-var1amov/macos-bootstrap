# Tmux mouse mode — FULL
#
# Installed to ~/.config/tmux-mouse.conf by install.sh when the user chose
# "tmux mouse mode". Sourced from ~/.tmux.conf.
#
# What this enables:
#   • Click a pane to focus it
#   • Drag a pane border to resize
#   • Mouse wheel scrolls tmux's copy-mode buffer (full history)
#   • Right-click inside a pane opens tmux's context menu
#   • Programs inside tmux can push to the system clipboard via OSC 52
#
# Tip even with mouse mode on: hold ⌥ Option while selecting in Ghostty to
# bypass tmux and do a native terminal selection (handy for copying long URLs
# that wrap across panes).
#
# To switch back to "normal terminal" behaviour:
#   ./install.sh --update   (and pick "normal terminal" when asked)

set -g mouse on
set -g set-clipboard on

# Mouse drag in copy-mode pipes the selection straight to the macOS clipboard.
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# Single click anywhere inside a pane: focus it (default tmux behaviour, here
# for clarity).
bind -n MouseDown1Pane   select-pane -t = \; send-keys -M

# Mouse wheel: enter copy-mode on the first scroll up; subsequent scrolls move
# half-page-at-a-time. Avoids the "mash wheel to see anything" feel.
bind -n WheelUpPane   if-shell -F -t = "#{alternate_on}" \
                       "send-keys -M" \
                       "select-pane -t =; copy-mode -e; send-keys -X -N 3 scroll-up"
bind -n WheelDownPane if-shell -F -t = "#{alternate_on}" \
                       "send-keys -M" \
                       "send-keys -X -N 3 scroll-down"
