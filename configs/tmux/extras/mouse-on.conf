# Tmux mouse mode — FULL
#
# Installed to ~/.config/tmux-mouse.conf by install.sh when the user chose
# "tmux mouse mode". Sourced from ~/.tmux.conf.
#
# What this enables:
#   - Click a pane to focus it
#   - Drag a pane border to resize
#   - Drag inside a pane to select text -> copies straight to macOS clipboard
#   - Double-click to select word, triple-click to select line (also copies)
#   - Click the session name in the status bar to open the fzf session switcher
#   - Mouse wheel scrolls tmux's copy-mode buffer (full history)
#   - Right-click inside a pane opens tmux's context menu
#   - Programs inside tmux can push to the system clipboard via OSC 52
#
# Tip even with mouse mode on: hold Option in Ghostty while selecting to bypass
# tmux and do a native terminal selection (handy for copying long URLs that
# wrap across panes).
#
# To switch back to "normal terminal" behaviour:
#   ./install.sh --update   (and pick "normal terminal" when asked)

set -g mouse on
set -g set-clipboard on

# Mouse drag in copy-mode pipes the selection straight to the macOS clipboard.
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# Double-click: select-word and copy. Triple-click: select-line and copy.
# The mouse_any_flag / pane_in_mode guard means apps that capture the mouse
# (vim, fzf, htop, less in mouse mode) still receive the event, and double-
# clicking inside an existing copy-mode selection forwards to copy-mode normally.
bind -n DoubleClick1Pane \
    select-pane -t = \; \
    if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" \
        "send-keys -M" \
        "copy-mode -H ; send-keys -X select-word ; send-keys -X copy-pipe-and-cancel 'pbcopy'"

bind -n TripleClick1Pane \
    select-pane -t = \; \
    if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" \
        "send-keys -M" \
        "copy-mode -H ; send-keys -X select-line ; send-keys -X copy-pipe-and-cancel 'pbcopy'"

# Click the session name on the left of the status bar -> fzf session switcher.
# Mirrors what Prefix + f does, but reachable with one mouse click.
bind -n MouseDown1StatusLeft display-popup \
  -E -w 50% -h 60% \
  -b rounded \
  -S "fg=#{@select}" \
  "sess=\$(tmux list-sessions \
     -F '#{session_name}: #{session_windows}w  #{?session_attached, attached, detached}' \
   | fzf --reverse --prompt='session > ' \
   | cut -d: -f1); \
   [ -n \"\$sess\" ] && tmux switch-client -t \"\$sess\""

# Mouse wheel: enter copy-mode on the first scroll up; subsequent scrolls move
# three lines at a time. The `-e` on `copy-mode -e` makes copy-mode exit
# automatically when scrolling back past the bottom of the history, so the next
# keystroke goes to the shell -- no stray `j` characters in your prompt.
bind -n WheelUpPane   if-shell -F -t = "#{alternate_on}" \
                       "send-keys -M" \
                       "select-pane -t =; copy-mode -e; send-keys -X -N 3 scroll-up"
bind -n WheelDownPane if-shell -F -t = "#{alternate_on}" \
                       "send-keys -M" \
                       "send-keys -X -N 3 scroll-down"
